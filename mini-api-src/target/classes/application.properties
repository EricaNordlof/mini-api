spring.application.name=mini-api
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/miniapi}
spring.datasource.username=${DB_USERNAME:miniuser}
spring.datasource.password=${DB_PASSWORD:minipassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET:MzIxNzY1NDMyMTc2NTQzMjE3NjU0MzIxNzY1NDMyMTc2NTQzMjE=}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
